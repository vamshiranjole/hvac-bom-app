<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOM Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">

  <div class="max-w-5xl mx-auto">

    <h1 class="text-2xl font-bold text-gray-800 mb-1">BOM Results</h1>
    <p class="text-sm text-gray-500 mb-6">Processing your HVAC equipment schedule...</p>

    <!-- Error message -->
    <div id="error-message" class="hidden bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4"></div>

    <!-- Progress Bar -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
      <div class="flex items-center justify-between">
        <div class="flex flex-col items-center text-xs" id="step1">
          <div class="w-7 h-7 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold mb-1">1</div>
          Queued
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-1"></div>
        <div class="flex flex-col items-center text-xs" id="step2">
          <div class="w-7 h-7 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold mb-1">2</div>
          Reading PDF
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-1"></div>
        <div class="flex flex-col items-center text-xs" id="step3">
          <div class="w-7 h-7 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold mb-1">3</div>
          Running AI
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-1"></div>
        <div class="flex flex-col items-center text-xs" id="step4">
          <div class="w-7 h-7 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold mb-1">4</div>
          Checking Rules
        </div>
        <div class="flex-1 h-1 bg-gray-200 mx-1"></div>
        <div class="flex flex-col items-center text-xs" id="step5">
          <div class="w-7 h-7 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center font-bold mb-1">5</div>
          Done
        </div>
      </div>
    </div>

    <!-- Summary Strip -->
    <div class="flex gap-4 mb-6">
      <div class="bg-white rounded-xl shadow-sm px-5 py-3 flex items-center gap-2">
        <span class="text-2xl font-bold text-gray-800" id="item-count">-</span>
        <span class="text-sm text-gray-500">items found</span>
      </div>
      <div class="bg-white rounded-xl shadow-sm px-5 py-3 flex items-center gap-2">
        <span class="text-2xl font-bold text-yellow-500" id="review-count">-</span>
        <span class="text-sm text-gray-500">need review</span>
      </div>
      <div class="bg-white rounded-xl shadow-sm px-5 py-3 flex items-center gap-2">
        <span class="text-2xl font-bold text-red-500" id="issue-count">-</span>
        <span class="text-sm text-gray-500">issues</span>
      </div>
    </div>

    <!-- BOM Table -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
          <tr>
            <th class="px-4 py-3 text-left">Tag</th>
            <th class="px-4 py-3 text-left">Type</th>
            <th class="px-4 py-3 text-left">Manufacturer</th>
            <th class="px-4 py-3 text-left">Model</th>
            <th class="px-4 py-3 text-left">Qty</th>
            <th class="px-4 py-3 text-left">Capacity</th>
            <th class="px-4 py-3 text-left">Voltage</th>
            <th class="px-4 py-3 text-left">Confidence</th>
            <th class="px-4 py-3 text-left">Status</th>
          </tr>
        </thead>
        <tbody id="bom-tbody" class="divide-y divide-gray-100">
          <tr><td colspan="9" class="px-4 py-8 text-center text-gray-400">Processing... please wait.</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 mb-4">
      <button id="downloadBtn" onclick="window.open(`https://hvac-bom-app-production.up.railway.app/jobs/${jobId}/download`)" class="bg-blue-500 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-blue-600 transition">Download Excel</button>
      <button disabled class="bg-gray-700 text-white px-5 py-2 rounded-lg text-sm font-semibold opacity-50 cursor-not-allowed">Send to Salesforce</button>
    </div>

    <a href="compare.html" class="text-sm text-blue-500 hover:underline">Compare with another version →</a>

  </div>

  <script src="js/results.js"></script>
</body>
</html>
