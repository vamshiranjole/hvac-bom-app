<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HVAC BOM Extractor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-lg">

    <h1 class="text-2xl font-bold text-gray-800 mb-1">HVAC BOM Extractor</h1>
    <p class="text-sm text-gray-500 mb-6">Upload your equipment schedule PDF to extract the Bill of Materials.</p>

    <!-- Drop Zone -->
    <div id="drop-zone"
      class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition"
      onclick="document.getElementById('fileInput').click()">
      <p class="text-gray-400 text-sm" id="drop-text">Drag & drop your PDF here, or click to browse</p>
      <p class="text-blue-500 font-medium mt-2 text-sm break-all leading-snug" id="file-name"></p>
    </div>

    <!-- Hidden File Input -->
    <input type="file" accept=".pdf" id="fileInput" class="hidden" />

    <!-- Project Name -->
    <div class="mt-5">
      <label class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
      <input type="text" id="projectName"
        placeholder="e.g. Trane Office Building 2026"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    </div>

    <!-- Extract Button -->
    <button id="extractBtn"
      disabled
      class="mt-6 w-full bg-blue-500 text-white font-semibold py-2 rounded-lg opacity-40 cursor-not-allowed transition">
      Extract BOM
    </button>

    <!-- Disclaimer -->
    <p class="text-xs text-gray-400 text-center mt-4">
      Your PDF is processed and deleted within 30 minutes. We do not store your documents.
    </p>

  </div>

  <script>
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("fileInput");
    const fileNameEl = document.getElementById("file-name");
    const extractBtn = document.getElementById("extractBtn");

    const API_URL = "https://hvac-bom-app-production.up.railway.app";
    let selectedFile = null;

    function handleFile(file) {
      if (file && file.type === "application/pdf") {
        selectedFile = file;
        fileNameEl.textContent = file.name;
        extractBtn.disabled = false;
        extractBtn.classList.remove("opacity-40", "cursor-not-allowed");
      }
    }

    extractBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      extractBtn.textContent = "Uploading...";
      extractBtn.disabled = true;
      const formData = new FormData();
      formData.append("file", selectedFile);
      try {
        const res = await fetch(`${API_URL}/upload`, {method: "POST", body: formData});
        const data = await res.json();
        window.location.href = `results.html?job=${data.job_id}`;
      } catch (err) {
        alert("Upload failed: " + err.message);
        extractBtn.textContent = "Extract BOM";
        extractBtn.disabled = false;
      }
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("border-blue-400", "bg-blue-50");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("border-blue-400", "bg-blue-50");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("border-blue-400", "bg-blue-50");
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    fileInput.addEventListener("change", () => {
      handleFile(fileInput.files[0]);
    });
  </script>

</body>
</html>
